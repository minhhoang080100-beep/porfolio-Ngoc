<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Hà Ngọc Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ===== PIN Overlay ===== */
        .pin-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .pin-box {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pin-icon {
            width: 70px; height: 70px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #a7d0f6, #7bb8e8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #0f0f1a;
        }

        .pin-box h2 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        .pin-box > p { color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }

        .pin-box input {
            width: 100%;
            padding: 1rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
        }

        .pin-box input:focus { outline: none; border-color: #a7d0f6; }

        .pin-error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 0.8rem;
            display: none;
        }

        /* ===== Buttons ===== */
        .btn-primary {
            background: linear-gradient(135deg, #a7d0f6, #7bb8e8);
            color: #0f0f1a;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(167,208,246,0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #e0e0e0;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 0.7rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-secondary:hover { background: rgba(255,255,255,0.12); }

        /* ===== Admin Header ===== */
        .admin-header {
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: #a7d0f6;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        /* ===== Tab Navigation ===== */
        .tab-nav {
            display: flex;
            gap: 0.3rem;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
        }

        .tab-btn {
            padding: 0.7rem 1.5rem;
            border: none;
            background: transparent;
            color: #777;
            cursor: pointer;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab-btn:hover { color: #bbb; background: rgba(255,255,255,0.05); }

        .tab-btn.active {
            background: rgba(167,208,246,0.12);
            color: #a7d0f6;
        }

        /* ===== Tab Content ===== */
        .tab-content {
            display: none;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active { display: block; }

        .tab-content h2 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #a7d0f6;
        }

        /* ===== Forms ===== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #ccc;
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }

        textarea:focus { outline: none; border-color: #a7d0f6; }

        /* ===== Upload Zone ===== */
        .upload-zone {
            border: 2px dashed rgba(167,208,246,0.25);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 1.5rem;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #a7d0f6;
            background: rgba(167,208,246,0.05);
        }

        .upload-icon {
            font-size: 2.5rem;
            color: #a7d0f6;
            margin-bottom: 1rem;
        }

        .upload-zone p { color: #888; margin-bottom: 1rem; }

        .btn-upload {
            background: rgba(167,208,246,0.15);
            color: #a7d0f6;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-upload:hover { background: rgba(167,208,246,0.25); }

        /* ===== Upload Progress ===== */
        .upload-progress {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a7d0f6, #7bb8e8);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 0.85rem;
            color: #a7d0f6;
        }

        /* ===== Album Grid ===== */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }

        .album-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            transition: 0.3s;
        }

        .album-card:hover { transform: scale(1.03); }

        .album-card img, .album-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-card .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(231,76,60,0.85);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            opacity: 0;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .album-card:hover .delete-btn { opacity: 1; }
        .album-card .delete-btn:hover { background: #e74c3c; transform: scale(1.1); }

        .album-card .type-badge {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #444;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.8rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transform: translateY(100px);
            opacity: 0;
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast.success { background: #2ecc71; color: white; }
        .toast.error { background: #e74c3c; color: white; }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* ===== Loading Spinner ===== */
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .admin-header { padding: 0.8rem 1rem; }
            .tab-nav { padding: 0.8rem 1rem; overflow-x: auto; }
            .tab-content { padding: 1.2rem; }
            .album-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .upload-zone { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>

    <!-- PIN Overlay -->
    <div class="pin-overlay" id="pinOverlay">
        <div class="pin-box">
            <div class="pin-icon"><i class="fas fa-lock"></i></div>
            <h2>Admin Panel</h2>
            <p>Nhập mã PIN để truy cập quản trị</p>
            <input type="password" id="pinInput" placeholder="••••" maxlength="20" autocomplete="off">
            <button class="btn-primary" id="btnPin" style="width:100%;justify-content:center;">
                <i class="fas fa-arrow-right"></i> Xác nhận
            </button>
            <p class="pin-error" id="pinError">Sai mã PIN! Vui lòng thử lại.</p>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" style="display:none;">
        <header class="admin-header">
            <div class="admin-logo">
                <i class="fas fa-sliders-h"></i> Quản Trị Portfolio
            </div>
            <a href="/" class="btn-secondary">
                <i class="fas fa-external-link-alt"></i> Xem trang chủ
            </a>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="content">
                <i class="fas fa-pen-fancy"></i> Nội dung
            </button>
            <button class="tab-btn" data-tab="album">
                <i class="fas fa-images"></i> Album
            </button>
        </nav>

        <!-- Tab: Nội dung -->
        <div class="tab-content active" id="tab-content">
            <h2><i class="fas fa-pen-fancy"></i> Chỉnh sửa Giới thiệu</h2>
            <div class="form-group">
                <label><i class="fas fa-flag"></i> Tiếng Việt</label>
                <textarea id="introVi" placeholder="Nhập giới thiệu bằng Tiếng Việt..."></textarea>
            </div>
            <div class="form-group">
                <label><i class="fas fa-globe"></i> Tiếng Anh (English)</label>
                <textarea id="introEn" placeholder="Enter English introduction..."></textarea>
            </div>
            <button class="btn-primary" id="btnSaveContent">
                <i class="fas fa-save"></i> Lưu Nội Dung
            </button>
        </div>

        <!-- Tab: Album -->
        <div class="tab-content" id="tab-album">
            <h2><i class="fas fa-images"></i> Quản lý Album</h2>

            <div class="upload-zone" id="uploadZone">
                <i class="fas fa-cloud-upload-alt upload-icon"></i>
                <p>Kéo thả ảnh hoặc video vào đây</p>
                <label>
                    <input type="file" id="fileInput" multiple accept="image/*,video/*" hidden>
                    <span class="btn-upload"><i class="fas fa-plus"></i> Chọn file từ máy</span>
                </label>
            </div>

            <div class="upload-progress" id="uploadProgress" style="display:none;">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <span class="progress-text" id="progressText">Đang upload...</span>
            </div>

            <div class="album-grid" id="albumGrid">
                <div class="empty-state" id="emptyState">
                    <i class="fas fa-photo-video"></i>
                    <p>Chưa có ảnh/video nào. Hãy upload ảnh đầu tiên!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
