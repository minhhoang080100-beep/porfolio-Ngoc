<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Hà Ngọc Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #fdf8f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #2b2a2a;
        }
        .pin-container {
            text-align: center;
            background: white;
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            max-width: 380px;
            width: 90%;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pin-logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: #a7d0f6;
            margin-bottom: 0.2rem;
            letter-spacing: -0.02em;
        }
        .pin-subtitle {
            color: #aaa;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 2rem;
        }
        .pin-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #eee;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
            transition: 0.3s;
            color: #2b2a2a;
        }
        .pin-input:focus { outline: none; border-color: #a7d0f6; }
        .pin-btn {
            width: 100%;
            padding: 1rem;
            background: #a7d0f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .pin-btn:hover { background: #2b2a2a; }
        .pin-error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="pin-container">
        <div class="pin-logo">HÀ NGỌC</div>
        <p class="pin-subtitle">Quản trị viên</p>
        <input type="password" class="pin-input" id="pinInput" placeholder="••••" autocomplete="off">
        <button class="pin-btn" id="btnPin">
            <i class="fas fa-arrow-right"></i> Truy cập
        </button>
        <p class="pin-error" id="pinError">
            <i class="fas fa-exclamation-circle"></i> Sai mã PIN!
        </p>
    </div>
    <script>
        const ADMIN_PIN = '1009';
        const pinInput = document.getElementById('pinInput');
        const btnPin = document.getElementById('btnPin');
        const pinError = document.getElementById('pinError');

        btnPin.addEventListener('click', checkPin);
        pinInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPin(); });
        pinInput.focus();

        function checkPin() {
            if (pinInput.value === ADMIN_PIN) {
                sessionStorage.setItem('adminMode', 'true');
                window.location.href = '/';
            } else {
                pinError.style.display = 'block';
                pinInput.style.borderColor = '#e74c3c';
                setTimeout(() => { pinInput.style.borderColor = '#eee'; }, 1500);
            }
        }
    </script>
</body>
</html>
